<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Academic coach mentoring students with a learning plan">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1f36"/>
      <stop offset="1" stop-color="#173965"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fcff"/>
      <stop offset="1" stop-color="#e6f1ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffc86f"/>
      <stop offset="1" stop-color="#ff8f4e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#091224" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <circle cx="1020" cy="110" r="240" fill="#2b5f95" opacity="0.26"/>
  <circle cx="150" cy="620" r="300" fill="#112a48" opacity="0.36"/>

  <text x="78" y="98" fill="#f1f7ff" font-family="Space Grotesk, sans-serif" font-size="54" font-weight="700">
    Academic Coach
  </text>
  <text x="80" y="136" fill="#b9d2ee" font-family="Space Grotesk, sans-serif" font-size="24">
    Study strategy • Accountability • Confidence building
  </text>

  <g filter="url(#shadow)">
    <rect x="92" y="178" width="1016" height="455" rx="28" fill="#0f2744" stroke="#7cb3ea" stroke-opacity="0.45" stroke-width="3"/>
  </g>

  <rect x="150" y="232" width="606" height="344" rx="18" fill="url(#panel)"/>
  <rect x="178" y="260" width="550" height="40" rx="10" fill="#2d67a1"/>
  <text x="198" y="287" fill="#eaf5ff" font-family="Space Grotesk, sans-serif" font-size="20" font-weight="600">Weekly Academic Plan</text>

  <rect x="186" y="324" width="24" height="24" rx="6" fill="#2d67a1"/>
  <path d="M193 337l6 6 12-12" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="224" y="342" fill="#214263" font-family="Space Grotesk, sans-serif" font-size="22">Math review and practice set</text>

  <rect x="186" y="376" width="24" height="24" rx="6" fill="#2d67a1"/>
  <path d="M193 389l6 6 12-12" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="224" y="394" fill="#214263" font-family="Space Grotesk, sans-serif" font-size="22">Essay outline with coach feedback</text>

  <rect x="186" y="428" width="24" height="24" rx="6" fill="#2d67a1"/>
  <path d="M193 441l6 6 12-12" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="224" y="446" fill="#214263" font-family="Space Grotesk, sans-serif" font-size="22">Quiz prep and retention drills</text>

  <rect x="186" y="484" width="210" height="52" rx="12" fill="url(#accent)"/>
  <text x="212" y="518" fill="#142132" font-family="Space Grotesk, sans-serif" font-size="24" font-weight="700">Goal Check-In</text>

  <g transform="translate(804 240)">
    <rect width="250" height="336" rx="18" fill="#0d1f36" stroke="#7cb3ea" stroke-opacity="0.5"/>
    <text x="26" y="50" fill="#f0f7ff" font-family="Space Grotesk, sans-serif" font-size="28" font-weight="600">Progress</text>

    <text x="26" y="94" fill="#9ac3eb" font-family="Space Grotesk, sans-serif" font-size="18">Assignments</text>
    <rect x="26" y="108" width="198" height="16" rx="8" fill="#1e3755"/>
    <rect x="26" y="108" width="156" height="16" rx="8" fill="#73b7ff"/>

    <text x="26" y="162" fill="#9ac3eb" font-family="Space Grotesk, sans-serif" font-size="18">Test Readiness</text>
    <rect x="26" y="176" width="198" height="16" rx="8" fill="#1e3755"/>
    <rect x="26" y="176" width="136" height="16" rx="8" fill="#73b7ff"/>

    <text x="26" y="230" fill="#9ac3eb" font-family="Space Grotesk, sans-serif" font-size="18">Attendance</text>
    <rect x="26" y="244" width="198" height="16" rx="8" fill="#1e3755"/>
    <rect x="26" y="244" width="176" height="16" rx="8" fill="#73b7ff"/>

    <text x="26" y="303" fill="#ffd6a3" font-family="Space Grotesk, sans-serif" font-size="20" font-weight="600">1:1 Mentoring Session</text>
  </g>
</svg>
